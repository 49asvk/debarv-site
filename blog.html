<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog - DebArv</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .blog-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem;
      position: relative;
      z-index: 2;
    }

    .blog-header {
      margin-bottom: 3rem;
    }

    .blog-header .back-link {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 1.5rem;
      display: inline-block;
      transition: color 0.3s ease;
    }

    .blog-header .back-link:hover {
      color: var(--secondary-color);
    }

    .blog-hero {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      text-align: center;
    }

    .blog-hero img {
      max-width: 400px;
      width: 100%;
      height: auto;
      border: 2px solid var(--primary-color);
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(232, 149, 107, 0.2);
    }

    .blog-title {
      font-size: 2.5rem;
      color: var(--dark-text);
      margin-bottom: 1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .blog-meta {
      display: flex;
      gap: 2rem;
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid rgba(232, 149, 107, 0.2);
    }

    .blog-content {
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--dark-text);
      margin-bottom: 3rem;
      background: rgba(232, 149, 107, 0.05);
      padding: 2rem;
      border-left: 4px solid var(--primary-color);
      border-radius: 8px;
    }

    .blog-content h3 {
      font-size: 1.8rem;
      color: var(--primary-color);
      margin: 2rem 0 1rem 0;
      font-weight: 700;
    }

    .blog-content h4 {
      font-size: 1.3rem;
      color: var(--secondary-color);
      margin: 1.5rem 0 0.8rem 0;
      font-weight: 600;
    }

    .blog-content ul {
      margin-left: 2rem;
      margin-bottom: 1rem;
    }

    .blog-content li {
      margin-bottom: 0.5rem;
      color: var(--dark-text);
    }

    .blog-content p {
      margin-bottom: 1rem;
    }

    .comments-section {
      margin-top: 3rem;
      padding-top: 3rem;
      border-top: 1px solid rgba(232, 149, 107, 0.2);
    }

    .comments-section h3 {
      font-size: 1.8rem;
      color: var(--primary-color);
      margin-bottom: 2rem;
      font-weight: 700;
    }

    .comment-form {
      background: rgba(232, 149, 107, 0.08);
      padding: 2rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      border: 1px solid rgba(232, 149, 107, 0.15);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--primary-color);
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid rgba(232, 149, 107, 0.2);
      border-radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1rem;
      resize: vertical;
      background: white;
      color: var(--dark-text);
      box-sizing: border-box;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: #999;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(232, 149, 107, 0.1);
    }

    .submit-btn {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 25px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(232, 149, 107, 0.3);
    }

    .submit-btn:hover {
      box-shadow: 0 6px 20px rgba(214, 123, 161, 0.4);
      transform: translateY(-2px);
    }

    .comments-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .comment {
      background: white;
      border: 1px solid rgba(232, 149, 107, 0.15);
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .comment-author {
      font-weight: 600;
      color: var(--primary-color);
      margin-bottom: 0.3rem;
    }

    .comment-date {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 0.8rem;
    }

    .comment-text {
      color: var(--dark-text);
      line-height: 1.6;
    }

    .all-blogs-link {
      display: block;
      margin-bottom: 2rem;
    }

    .all-blogs-btn {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(232, 149, 107, 0.3);
    }

    .all-blogs-btn:hover {
      box-shadow: 0 6px 20px rgba(214, 123, 161, 0.4);
      transform: translateY(-2px);
    }

    .blog-grid-small {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .blog-card-small {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(232, 149, 107, 0.15);
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .blog-card-small:hover {
      transform: translateY(-5px);
      border-color: var(--primary-color);
      box-shadow: 0 8px 20px rgba(232, 149, 107, 0.2);
    }

    .blog-card-small .blog-card-image {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      background: linear-gradient(135deg, rgba(232, 149, 107, 0.1), rgba(245, 184, 176, 0.1));
    }

    .blog-card-small-content {
      padding: 1rem;
    }

    .blog-card-small-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--dark-text);
      margin-bottom: 0.3rem;
    }

    .blog-card-small-date {
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>
  <!-- Navigation Header -->
  <header class="header">
    <nav class="navbar">
      <div class="logo">
        <div class="logo-placeholder">❤️</div>
        <a href="/">DebArv</a>
      </div>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/#about">About</a></li>
        <li><a href="/#blogs">Blogs</a></li>
        <li><a href="/#projects">Projects</a></li>
        <li><a href="https://arv.debarv.com" class="nav-resume" target="_blank">Arv's Resume</a></li>
        <li><a href="https://deb.debarv.com" class="nav-resume" target="_blank">Deb's Resume</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="blog-container">
    <div class="blog-header">
      <a href="/#blogs" class="back-link">← Back to Blogs</a>
    </div>

    <div id="blogDetail"></div>

    <div id="otherBlogsSection" style="display: none; margin-top: 4rem;">
      <h3 style="color: var(--dark-text); margin-bottom: 2rem;">Other Blogs</h3>
      <div class="blog-grid-small" id="otherBlogs"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2025 DebArv | Built with love, logic, and a little bit of poetry 💫</p>
  </footer>

  <!-- Scripts -->
  <script src="script.js"></script>
  <script>
    function loadBlogDetail() {
      const selectedBlogId = parseInt(sessionStorage.getItem('selectedBlogId') || 1);
      
      // Find the blog from blogsData
      const blog = window.blogsData.find(b => b.id === selectedBlogId);

      if (blog) {
        // Update page title
        document.title = blog.title + ' - DebArv';

        // Render blog detail
        document.getElementById('blogDetail').innerHTML = `
          <div class="blog-hero">
            <img src="${blog.image}" alt="${blog.title}" />
          </div>
          <h1 class="blog-title">${blog.title}</h1>
          <div class="blog-meta">
            <span>📅 ${blog.date}</span>
            <span>✍️ By ${blog.author}</span>
          </div>

          <div class="blog-content">
            ${blog.content}
          </div>

          <!-- Comments Section -->
          <div class="comments-section">
            <h3>Comments</h3>
            
            <div class="comment-form">
              <h4 style="margin-top: 0; margin-bottom: 1.5rem;">Leave a Comment</h4>
              <form id="commentForm">
                <div class="form-group">
                  <label for="name">Name</label>
                  <input type="text" id="name" name="name" placeholder="Your name" required>
                </div>
                <div class="form-group">
                  <label for="email">Email</label>
                  <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                  <label for="comment">Comment</label>
                  <textarea id="comment" name="comment" rows="4" placeholder="Share your thoughts..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Post Comment</button>
              </form>
            </div>

            <div class="comments-list" id="commentsList">
              <div class="comment">
                <div class="comment-author">Alex Chen</div>
                <div class="comment-date">March 18, 2025</div>
                <div class="comment-text">Great article! Really helpful insights on best practices.</div>
              </div>
              <div class="comment">
                <div class="comment-author">Jordan Smith</div>
                <div class="comment-date">March 17, 2025</div>
                <div class="comment-text">Thanks for sharing. Looking forward to more posts like this!</div>
              </div>
            </div>
          </div>
        `;

        // Add event listener to comment form
        document.getElementById('commentForm').addEventListener('submit', function(e) {
          e.preventDefault();
          submitComment();
        });

        // Load other blogs
        loadOtherBlogs(blog.id);
      }
    }

    function submitComment() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const comment = document.getElementById('comment').value;

      // Create new comment element
      const commentsList = document.getElementById('commentsList');
      const newComment = document.createElement('div');
      newComment.className = 'comment';
      newComment.innerHTML = `
        <div class="comment-author">${escapeHtml(name)}</div>
        <div class="comment-date">Just now</div>
        <div class="comment-text">${escapeHtml(comment)}</div>
      `;

      commentsList.insertBefore(newComment, commentsList.firstChild);

      // Clear form
      document.getElementById('commentForm').reset();

      // Show success message
      const submitBtn = document.querySelector('.submit-btn');
      const originalText = submitBtn.textContent;
      submitBtn.textContent = '✓ Comment Posted!';
      setTimeout(() => {
        submitBtn.textContent = originalText;
      }, 2000);
    }

    function loadOtherBlogs(currentBlogId) {
      const otherBlogs = window.blogsData.filter(b => b.id !== currentBlogId);

      if (otherBlogs.length > 0) {
        document.getElementById('otherBlogsSection').style.display = 'block';
        const otherBlogsContainer = document.getElementById('otherBlogs');

        otherBlogsContainer.innerHTML = otherBlogs.map(blog => `
          <div class="blog-card-small" onclick="selectBlog(${blog.id})">
            <div class="blog-card-image">${blog.emoji || '📝'}</div>
            <div class="blog-card-small-content">
              <div class="blog-card-small-title">${blog.title}</div>
              <div class="blog-card-small-date">${blog.date}</div>
            </div>
          </div>
        `).join('');
      }
    }

    function selectBlog(blogId) {
      sessionStorage.setItem('selectedBlogId', blogId);
      loadBlogDetail();
      window.scrollTo(0, 0);
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Load blog when page loads
    document.addEventListener('DOMContentLoaded', loadBlogDetail);
  </script>
</body>
</html>
