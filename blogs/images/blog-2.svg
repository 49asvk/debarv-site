<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a4d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d0052;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff006e" stroke-width="1" opacity="0.2"/>
    </pattern>
  </defs>
  
  <rect width="800" height="400" fill="url(#bgGradient2)"/>
  <rect width="800" height="400" fill="url(#grid2)"/>
  
  <!-- Retro wave -->
  <path d="M 0 200 Q 200 150 400 200 T 800 200" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.7"/>
  <path d="M 0 220 Q 200 170 400 220 T 800 220" fill="none" stroke="#ff006e" stroke-width="2" opacity="0.5"/>
  
  <!-- Geometric elements -->
  <polygon points="400,80 450,150 400,220 350,150" fill="none" stroke="#ff006e" stroke-width="2" opacity="0.7"/>
  <polygon points="400,100 435,160 400,220 365,160" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  
  <text x="400" y="300" font-size="52" fill="none" stroke="#00d4ff" stroke-width="1" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" opacity="0.3">DESIGN</text>
  <text x="400" y="300" font-size="52" fill="#00d4ff" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" opacity="0.8">DESIGN</text>
</svg>