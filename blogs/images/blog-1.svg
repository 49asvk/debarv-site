<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Retro grid background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
    </pattern>
  </defs>
  
  <!-- Background gradient -->
  <rect width="800" height="400" fill="#0a0e27"/>
  <rect width="800" height="400" fill="url(#bgGradient)"/>
  
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0033;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001a4d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Grid -->
  <rect width="800" height="400" fill="url(#grid)"/>
  
  <!-- Retro elements -->
  <circle cx="150" cy="100" r="60" fill="none" stroke="#ff006e" stroke-width="3" opacity="0.7"/>
  <circle cx="150" cy="100" r="50" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  
  <rect x="550" y="250" width="120" height="120" fill="none" stroke="#ff006e" stroke-width="3" opacity="0.7" transform="rotate(45 610 310)"/>
  <rect x="560" y="260" width="100" height="100" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5" transform="rotate(45 610 310)"/>
  
  <!-- Neon text effect -->
  <text x="400" y="200" font-size="48" fill="none" stroke="#ff006e" stroke-width="1" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" opacity="0.3">BLOG</text>
  <text x="400" y="200" font-size="48" fill="#ff006e" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" opacity="0.8">BLOG</text>
</svg>