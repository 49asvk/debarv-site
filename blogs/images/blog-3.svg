<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d0052;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001a4d;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
    </pattern>
  </defs>
  
  <rect width="800" height="400" fill="url(#bgGradient3)"/>
  <rect width="800" height="400" fill="url(#grid3)"/>
  
  <!-- Retro sun -->
  <circle cx="650" cy="100" r="50" fill="none" stroke="#ff006e" stroke-width="3" opacity="0.7"/>
  <line x1="650" y1="30" x2="650" y2="0" stroke="#ff006e" stroke-width="2"/>
  <line x1="650" y1="170" x2="650" y2="200" stroke="#ff006e" stroke-width="2"/>
  <line x1="720" y1="100" x2="750" y2="100" stroke="#ff006e" stroke-width="2"/>
  <line x1="580" y1="100" x2="550" y2="100" stroke="#ff006e" stroke-width="2"/>
  
  <!-- Retro mountains -->
  <polygon points="0,300 150,150 300,300" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <polygon points="200,300 400,100 600,300" fill="none" stroke="#ff006e" stroke-width="2" opacity="0.6"/>
  <polygon points="500,300 700,150 800,300" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  
  <text x="400" y="350" font-size="48" fill="#ff006e" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">CREATIVE</text>
</svg>