  </defs>
  
  <rect width="800" height="400" fill="url(#projectGrad2)"/>
  
  <!-- Grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
