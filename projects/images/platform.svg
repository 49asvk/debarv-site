<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="projectGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d0052;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#projectGrad3)"/>
  
  <!-- Retro squares pattern -->
  <g opacity="0.3">
    <rect x="0" y="0" width="50" height="50" fill="none" stroke="#ff006e" stroke-width="2"/>
    <rect x="60" y="30" width="50" height="50" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <rect x="120" y="0" width="50" height="50" fill="none" stroke="#ff006e" stroke-width="2"/>
    <rect x="180" y="30" width="50" height="50" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <rect x="300" y="100" width="50" height="50" fill="none" stroke="#ff006e" stroke-width="2"/>
    <rect x="360" y="130" width="50" height="50" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <rect x="500" y="200" width="50" height="50" fill="none" stroke="#ff006e" stroke-width="2"/>
    <rect x="560" y="230" width="50" height="50" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <rect x="650" y="150" width="50" height="50" fill="none" stroke="#ff006e" stroke-width="2"/>
    <rect x="710" y="180" width="50" height="50" fill="none" stroke="#00d4ff" stroke-width="2"/>
  </g>
  
  <!-- Center element -->
  <circle cx="400" cy="200" r="100" fill="none" stroke="#ff006e" stroke-width="3" opacity="0.8"/>
  <circle cx="400" cy="200" r="80" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="200" r="60" fill="none" stroke="#ff006e" stroke-width="2" opacity="0.4"/>
  
  <text x="400" y="360" font-size="52" fill="#00d4ff" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">PLATFORM</text>
</svg>