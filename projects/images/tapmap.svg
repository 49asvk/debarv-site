<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="projectGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0033;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001a4d;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="20" height="20">
      <circle cx="10" cy="10" r="2" fill="#00d4ff" opacity="0.3"/>
    </pattern>
  </defs>
  
  <rect width="800" height="400" fill="url(#projectGrad1)"/>
  <rect width="800" height="400" fill="url(#dots)"/>
  
  <!-- Retro shapes -->
  <rect x="100" y="80" width="150" height="150" fill="none" stroke="#ff006e" stroke-width="3" opacity="0.7"/>
  <rect x="110" y="90" width="150" height="150" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  
  <circle cx="600" cy="150" r="80" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.7"/>
  <circle cx="600" cy="150" r="65" fill="none" stroke="#ff006e" stroke-width="2" opacity="0.5"/>
  
  <text x="400" y="330" font-size="64" fill="none" stroke="#ff006e" stroke-width="1" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" opacity="0.2">MAP</text>
  <text x="400" y="330" font-size="64" fill="#ff006e" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" opacity="0.8">MAP</text>
</svg>